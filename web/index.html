<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>课程目录自动生成系统</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background:#f5f6fa; margin:0; }
    header { background:#2d6cdf; color:#fff; padding:20px; text-align:center; }
    .box { max-width:800px; margin:40px auto; background:#fff; padding:20px; border-radius:10px; }
    .upload { border:2px dashed #ccc; padding:40px; text-align:center; cursor:pointer; }
    button { margin-top:20px; padding:10px 20px; background:#2d6cdf; color:#fff; border:none; cursor:pointer; }
  </style>
</head>

<body>

<header>📚 Excel课程目录自动生成系统</header>

<div class="box">

  <div class="upload" id="drop">
    拖拽 Excel 文件到这里 或 点击选择
    <input type="file" id="file" hidden />
  </div>

  <button onclick="downloadResult()">下载生成结果</button>

</div>

<script src="app.js"></script>

</body>
</html>
