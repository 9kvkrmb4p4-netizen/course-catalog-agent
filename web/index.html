<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>课程目录生成系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body style="font-family: Arial; padding: 30px;">

<h2>📘 课程目录自动生成系统</h2>

<!-- 文件1 -->
<div>
    <h3>① 上传课程目录-1</h3>
    <input type="file" id="file1">
</div>

<br>

<!-- 文件2 -->
<div>
    <h3>② 上传课程目录-2（规则表）</h3>
    <input type="file" id="file2">
</div>

<br>

<!-- 生成按钮 -->
<div>
    <button onclick="generate()" style="padding:10px 20px;font-size:16px;">
        🚀 生成课程目录编码
    </button>
</div>

<br>

<!-- 输出提示 -->
<div id="status"></div>

<!-- 引入你的JS -->
<script src="app.js"></script>

</body>
</html>
