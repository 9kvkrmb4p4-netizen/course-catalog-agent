<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <title>课程目录自动生成系统</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 30px; }
    .box { margin-bottom: 20px; }
    button { padding: 12px 20px; cursor: pointer; }
  </style>
</head>

<body>

<h1>📘 课程目录自动生成系统</h1>

<div class="box">
  <h3>① 上传课程目录-1</h3>
  <input type="file" id="file1" accept=".xlsx">
</div>

<div class="box">
  <h3>② 上传课程目录-2（规则表）</h3>
  <input type="file" id="file2" accept=".xlsx">
</div>

<button id="genBtn">🚀 生成课程目录编码</button>

<p id="msg"></p>

<script src="./app.js"></script>

</body>
</html>
